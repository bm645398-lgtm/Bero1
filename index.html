<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bero</title>
  <style>
    body { background: #0a0a0a; color: #e0e0e0; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
    .header { background: #111; padding: 15px; text-align: center; font-weight: bold; }
    .container { padding: 15px; }
    .card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
    .btn { background: #6366f1; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; margin-top: 10px; }
    input { width: 90%; padding: 10px; background: #222; border: 1px solid #333; color: white; border-radius: 5px; }
    .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px; }
    .tab { display: none; }
    .tab.active { display: block; }
  </style>
</head>
<body>
<div class="header">Bero</div>
<div class="container">
  <div id="tasks-tab" class="tab active">
    <input type="text" id="task-input" placeholder="اكتب المهمة هنا...">
    <button class="btn" onclick="addTask()">إضافة مهمة</button>
    <div id="task-list"></div>
  </div>
  <div id="ai-tab" class="tab">
    <div id="chat" style="height:200px; background:#111; padding:10px; margin-bottom:10px; border-radius:5px; overflow-y:auto;">Alex: أهلاً براء!</div>
    <input type="text" id="ai-input" placeholder="كلم Alex...">
    <button class="btn" onclick="askAlex()">إرسال</button>
  </div>
</div>
<div class="nav">
  <button onclick="document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('tasks-tab').classList.add('active')">المهام</button>
  <button onclick="document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('ai-tab').classList.add('active')">Alex</button>
</div>
<script>
  function addTask() {
    let input = document.getElementById('task-input');
    let list = document.getElementById('task-list');
    if(input.value) {
      list.innerHTML += `<div class="card">${input.value}</div>`;
      input.value = '';
    }
  }
  function askAlex() {
    let input = document.getElementById('ai-input');
    let chat = document.getElementById('chat');
    chat.innerHTML += `<div style="color:#6366f1">أنت: ${input.value}</div>`;
    chat.innerHTML += `<div style="color:#aaa">Alex: أنا هنا يا براء، لسه بنتعلم الربط!</div>`;
    input.value = '';
  }
</script>
</body>
</html>
